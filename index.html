<!doctype html>
<html lang="fr">
	<head>
		<link rel="stylesheet" href="./assets/css/style.css" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>recherche de stage</title>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
		/>
	</head>
	<body>
		<!-- Header -->
		<header>
			<img
				src="../../assets/image/burger-bar.png"
				class="menu_burger_icone"
				alt="menu burger"
			/>

			<a href="./header.html">
				<img
					src="./assets/image/logo.png"
					src="../../assets/image/logo.png"
					class="logo"
					alt="logo du site"
			/></a>

			<nav class="navbar">
				<ul class="liens_btn">
					<li>
						<a href="./header.html" class="active"> Acceuil </a>
					</li>
					<li><a href="./pages/offres.html"> Offres </a></li>
					<li><a href="./pages/dashboard.html"> Dashboard </a></li>
				</ul>
			</nav>

			<a href="./pages/profil.html" class="profil"
				><img
					class="img_profil"
					src="../../assets/image/utilisateur.png"
					alt="icone du profil"
				/>
			</a>
		</header>

		<!-- Main -->
		<main class="main_index">
			<section class="section_index">
				<div class="div_sec_index">
					<h1>
						Trouvez l'emploi <br />
						idéal pour vous !
					</h1>
					<div class="rdiv_index">
						<div class="search_bar">
							<input type="search" placeholder="Emplois ?" />
							<input type="search" placeholder="Où ?" />
							<button type="submit">
								<svg
									aria-hidden="true"
									width="18"
									height="18"
									viewBox="0 0 18 18"
								>
									<path
										d="m18 16.5-5.14-5.18h-.35a7 7 0 1 0-1.19 1.19v.35L16.5 18zM12 7A5 5 0 1 1 2 7a5 5 0 0 1 10 0"
									></path>
								</svg>
							</button>
						</div>

						<h3>Recherches populaire</h3>
						<div class="div_button_index">
							<button>designer</button>
							<button>developper</button>
							<button>web</button>
						</div>
					</div>
				</div>
				<aside>
					<h2>128 offres d'emplois</h2>
					<h2>86 offres de stages</h2>
					<h2>120 offres d'alternances</h2>
				</aside>
			</section>
		</main>

		<!-- Footer -->
		<footer>
			<nav>
				<ul>
					<li><a href="../../pages/crédits"> crédits</a></li>
					<li>
						<a href="../../pages/mention_légal">mention légal</a>
					</li>
				</ul>
			</nav>
		</footer>
	</body>

	<script>
		const menu_burger = document.querySelector(".menu_burger_icone");
		const liens_btn = document.querySelector(".liens_btn");

		menu_burger.addEventListener("click", () => {
			liens_btn.classList.toggle("menu");
		});
	</script>
</html>
